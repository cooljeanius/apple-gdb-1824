[codespell]

# Skip ChangeLogs and generated files.
skip = */ChangeLog*,*/configure,gdbsupport/Makefile.in,*.dat,*.eps,src/gdb/features/*.c,src/gdb/ada-casefold.h,src/gdb/copying.c,src/gdb/gdbarch-gen.h,src/gdb/gdbarch-gen.c,src/gdb/target-delegates-gen.c,src/gdb/aclocal.m4,src/gdb/gdbserver/aclocal.m4,gdbsupport/aclocal.m4

ignore-words = src/gdb/contrib/codespell-ignore-words.txt
dictionary = src/gdb/contrib/codespell-dictionary.txt,-

# Ignore all URLs.
uri-ignore-words-list = *

# How to ignore blocks of code.
ignore-multiline-regex = codespell:ignore-begin.*codespell:ignore-end
